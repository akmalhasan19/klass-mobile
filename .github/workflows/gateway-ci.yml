name: Gateway CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - 'proto/**'
      - '.github/workflows/gateway-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gateway/**'
      - 'proto/**'

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Lint ──────────────────────────────────────────────
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Test ─────────────────────────────────────────────
  test:
    name: Test (cargo nextest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: klass_test
          POSTGRES_USER: klass
          POSTGRES_PASSWORD: klass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: gateway
    env:
      DATABASE_URL: postgres://klass:klass_test@localhost:5432/klass_test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway

      - uses: taiki-e/install-action@cargo-nextest

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Prepare sqlx offline data
        run: cargo sqlx prepare --check

      - name: Run tests
        run: cargo nextest run --all-features

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-report
          path: gateway/target/nextest/default/junit.xml

  # ── Build ────────────────────────────────────────────
  build:
    name: Build (Docker image)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: gateway
          push: false
          load: true
          tags: klass-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect klass-gateway:latest --format '{{.Size}}')
          echo "Image size: $SIZE bytes"
          # Target <30MB, warn if >50MB
          if [ "$SIZE" -gt 50000000 ]; then
            echo "::warning::Docker image size >50MB, target <30MB"
          fi

  # ── Deploy ───────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json"

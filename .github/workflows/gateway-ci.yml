name: Gateway CI

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - 'proto/**'
      - '.github/workflows/gateway-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gateway/**'
      - 'proto/**'
  schedule:
    # Weekly security audit
    - cron: '0 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true
  RUSTFLAGS: "-D warnings"

jobs:
  # ═══════════════════════════════════════════
  # Lint
  # ═══════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ═══════════════════════════════════════════
  # Test
  # ═══════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: klass_test
          POSTGRES_USER: klass
          POSTGRES_PASSWORD: klass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: gateway
    env:
      DATABASE_URL: postgres://klass:klass_test@localhost:5432/klass_test
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-sqlx

      - name: Run migrations
        run: cargo sqlx migrate run

      - name: Verify sqlx offline data
        run: cargo sqlx prepare --check

      - name: Run tests
        run: cargo nextest run --all-features --profile ci

      - name: Generate coverage (tarpaulin)
        run: |
          cargo install cargo-tarpaulin --version 0.31
          cargo tarpaulin --out Xml --output-dir target/tarpaulin

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: gateway/target/tarpaulin/cobertura.xml
          flags: gateway
          fail_ci_if_error: false

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-report
          path: gateway/target/nextest/ci/junit.xml
          retention-days: 7

  # ═══════════════════════════════════════════
  # Security Audit
  # ═══════════════════════════════════════════
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run cargo-audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════
  # Build Docker Image
  # ═══════════════════════════════════════════
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: false
          load: true
          tags: klass-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          SIZE=$(docker image inspect klass-gateway:latest --format '{{.Size}}')
          SIZE_MB=$(( SIZE / 1024 / 1024 ))
          echo "Image size: ${SIZE_MB}MB (${SIZE} bytes)"
          if [ "$SIZE_MB" -gt 50 ]; then
            echo "::warning::Docker image ${SIZE_MB}MB exceeds 50MB target"
          fi

      - name: Test health endpoint
        run: |
          docker run -d --name klass-test -p 8080:8080 \
            -e DATABASE_URL=postgres://unused \
            klass-gateway:latest
          sleep 5
          curl -f http://localhost:8080/health || echo "Health check failed (expected — no DB in CI)"
          docker stop klass-test

  # ═══════════════════════════════════════════
  # Deploy to Render
  # ═══════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.klass.app
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST \
            --fail-with-body \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Wait for deploy health
        run: |
          # Poll health endpoint until 200 or timeout
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.klass.app/health)
            if [ "$STATUS" = "200" ]; then
              echo "Deploy healthy after ${i}0 seconds"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Deploy did not become healthy within 5 minutes"
          exit 1

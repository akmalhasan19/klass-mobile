  # =========================================================================
  # Media Generation (6 protected endpoints)
  # =========================================================================
  /media-generations:
    get:
      tags: [Media Generation]
      summary: List media generation history for current user
      parameters:
        - name: parent_id
          in: query
          schema: { type: string, format: uuid }
          description: Filter by parent generation (regeneration chain)
        - name: page
          in: query
          schema: { type: integer }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/MediaGeneration" }
                      meta: { $ref: "#/components/schemas/PaginationMeta" }
    post:
      tags: [Media Generation]
      summary: Submit new media generation request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaGenerationRequest"
      responses:
        "201":
          description: Generation dibuat (status QUEUED)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MediaGeneration" }
                      progress_stream_url:
                        type: string
                        description: gRPC stream URL untuk progress events (jika tersedia)
                        example: "grpc://api.klass.app:50051/klass.media.v1.MediaGenerationService/SubmitMediaGeneration"
        "422":
          $ref: "#/components/schemas/ErrorResponse"

  /media-generations/{mediaGeneration}:
    get:
      tags: [Media Generation]
      summary: Poll current media generation status (REST fallback)
      parameters:
        - name: mediaGeneration
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MediaGeneration" }
        "404":
          $ref: "#/components/schemas/ErrorResponse"

  /media-generations/{mediaGeneration}/regenerate:
    post:
      tags: [Media Generation]
      summary: Regenerate from existing generation (parent)
      parameters:
        - name: mediaGeneration
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: Parent generation ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateRequest"
      responses:
        "201":
          description: Regeneration dibuat (status QUEUED)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MediaGeneration" }

